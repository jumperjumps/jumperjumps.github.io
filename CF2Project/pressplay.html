<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press Play</title>
  <link rel="stylesheet" href="pp.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plaster&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <h1>Press Play</h1>

  <div id="menu">
   
    <p>Click shapes when they're most square</p>
    <p>Choose a difficulty to start</p>
    <div id="difficulty-cards">
      <div class="card" id="easy">
        <span class="card-label" style="color:#84B082">Easy</span>
        <span class="card-stat">25s timer</span>
        <span class="card-stat">speed x2.5</span>
      </div>
      <div class="card" id="normal">
        <span class="card-label" style="color:#ECA72C">Normal</span>
        <span class="card-stat">15s timer</span>
        <span class="card-stat">speed x4.0</span>
      </div>
      <div class="card" id="hard">
        <span class="card-label" style="color:#F25F5C">Hard</span>
        <span class="card-stat">10s timer</span>
        <span class="card-stat">speed x5.0</span>
      </div>
    </div>
  </div>

 
  <div id="game" class="hidden">
    <div id="grid"></div>
    <div id="display">
      <span id="difficulty-badge"></span>
      <div id="timer-track">
        <div id="timer-bar"></div>
      </div>
      <span id="timer-text">15s</span>
    </div>
  </div>

 
  <div id="gameover" class="hidden">
    <div id="gameover-panel">
      <p id="gameover-reason"></p>
      <h2 id="gameover-score"></h2>
      <p id="gameover-out">out of 900</p>
      <p id="gameover-rating"></p>
      <p id="gameover-hint">space to play again</p>
    </div>
  </div>

  <script src="classShape.js"></script>
  <script src="pressplay.js"></script>

</body>
</html>
