<!DOCTYPE html>
<html lang="en">
<style>
    body {
  font: 1.2em / 1.5 sans-serif;
}



/* Grid 1 */
.grid1 > * {
  background-color: #4d7298;
  border: 2px solid #77a6b6;
  border-radius: 0.5em;
  color: white;
  padding: 0.5em;
}

.grid1 {
 display:grid;
 gap: 20px;
 grid-template-columns: auto auto auto;

}

/* Grid 2 */
.grid2 > * {
  border-radius: 0.5em;
  color: white;
  padding: 0.5em;
}

.item1 {
  background-color: rgb(74 102 112 / 70%);
  border: 5px solid rgb(74 102 112 / 100%);
}

.item2 {
  background-color: rgb(214 162 173 / 70%);
  border: 5px solid rgb(214 162 173 / 100%);
}

.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  grid-template-rows: 100px 100px 100px;
  gap: 10px;
}

.item1 {
  grid-column: 1/4;
  grid-row: 1/3;
}

.item2 {
  grid-column: 2/5;
  grid-row: 2/4;
}

/* Grid 3 */
.grid3 > * {
  background-color: #4d7298;
  border: 2px solid #77a6b6;
  border-radius: 0.5em;
  color: white;
  padding: 0.5em;
}

.grid3 {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 10px;
  grid-template-areas: 
  "a a"
  "b c"
  ". d";
}

.one{
  grid-area: a;
}
.two{
  grid-area: b;
}
.three{
  grid-area: c;
}
.four{
  grid-area: d;
}
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<div class="grid1">
  <div>One</div>
  <div>Two</div>
  <div>Three</div>
  <div>Four</div>
</div>

<div class="grid2">
  <div class="item1">One</div>
  <div class="item2">Two</div>
</div>

<div class="grid3">
  <div class="one">One</div>
  <div class="two">Two</div>
  <div class="three">Three</div>
  <div class="four">Four</div>
</div>
    
</body>
</html>
