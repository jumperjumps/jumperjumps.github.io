<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Lexend+Exa:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Lexend+Exa:wght@100..900&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-accent:  #EB5E28;      
      --color-accent2: #E3B23C;     
      --color-background: #403D39;
      --color-lightbackground:  #CCC5B9;
      --color-text-dark: #252422;
      --color-text-light: #FFFCF2;

      /* Typography */
      --font-primary: 'Lexend Exa', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-secondary: "Libre Caslon Text", serif;
    }
    body{
      background-color: var(--color-background);
      margin: 0;
      padding: 40px;
    }
    label{
      padding: 20px;
      font-family: var(--font-primary);
      color:var(--color-lightbackground);
    }
    input{
      background-color: var(--color-text-dark);
      color: var(--color-text-light);
      border: transparent;
    }
    .generate{
      background-color:var(--color-accent);
      margin: 10px;
      border-radius: 20px;
      border: var(--color-background);
      font-family: var(--font-primary);
      color:var(--color-text-dark);
    }
    fieldset{
      font-family: var(--font-primary);
      color:var(--color-lightbackground);
    }



  </style>
</head>
<body>
    <div>
  <label for="custom-name">Enter custom name:</label>
  <input id="custom-name" type="text" placeholder="" />
</div>
<fieldset>
  <legend>Choose locale:</legend>
  <label for="us">US</label
  ><input id="us" type="radio" name="uk-us" value="us" checked />
  <label for="uk">UK</label
  ><input id="uk" type="radio" name="uk-us" value="uk" />
</fieldset>
<div>
  <button class="generate">Generate random story</button>
</div>
<!-- Thanks a lot to Willy Aguirre for his help with the code for this assessment -->
<p class="story"></p>

<script>
    // Complete variable definitions and random functions

const customName = document.getElementById("custom-name");
const generateBtn = document.querySelector(".generate");
const story = document.querySelector(".story");

function randomValueFromArray(array) {
  const random = Math.floor(Math.random() * array.length);
  return array[random];
}

// Raw text strings

let characters = ["Willy the Goblin", "Big Daddy", "Father Christmas"];
let places = ["the soup kitchen", "Disneyland", "the White House"];
let events = ["spontaneously combusted", "melted into a puddle on the sidewalk", "turned into a slug and slithered away"];

// Partial return random string function

function returnRandomStoryString() {
    const randomCharacter= randomValueFromArray(characters);
    const randomPlace= randomValueFromArray(places);
    const randomEvent= randomValueFromArray(events);
 let storyText = `It wasa hot summers day, so ${randomCharacter} went outsdide, got on their bike and rode off into the town. They rode to ${randomPlace}, and stopped for a few minutes, then ${randomEvent}. Bob saw the whole thing, but was not surprised — ${randomCharacter} was a professional ice skater and it was a hot day.`;
  return storyText;
}

// Event listener and partial generate function definition

generateBtn.addEventListener("click", generateStory);

function generateStory() {
    let newStory = returnRandomStoryString()
  if (customName.value !== "") {
    const name = customName.value;
    newStory = newStory.replace("Bob", name);
  }

  if (document.getElementById("uk").checked) {
    const weight = `${Math.round(300 / 14)} stone`;
    const temperature = `${Math.round((94 - 32) * (5 / 9))} Celsius`;
    newStory = newStory.replace("300 pounds", weight);
    newStory = newStory.replace("94 Fahrenheit", temperature);
  }

  // TODO: replace "" with the correct expression
  story.textContent = newStory;
  story.style.visibility = "visible";
}
</script>
    
</body>
</html>
